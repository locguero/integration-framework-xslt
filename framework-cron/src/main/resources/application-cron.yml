framework:
  cron:
    erp-poll:
      # Default: every hour on the hour.  Override with any Quartz cron expression.
      # Examples:
      #   every 5 minutes  → "0 */5 * * * ?"
      #   every 30 minutes → "0 */30 * * * ?"
      #   every hour       → "0 0 * * * ?"
      #   every day at 2am → "0 0 2 * * ?"
      cron: "0 */5 * * * ?"
