camel:
  component:
    kafka:
      brokers: ${KAFKA_BROKERS:localhost:9092}

spring:
  profiles:
    active: http,core
  datasource:
    url: ${DB_URL:jdbc:h2:file:./framework-data/db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USER:sa}
    password: ${DB_PASS:}
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2-console
