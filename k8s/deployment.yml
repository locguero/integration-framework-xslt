apiVersion: apps/v1
kind: Deployment
metadata:
  name: integration-framework
spec:
  replicas: 2
  selector:
    matchLabels:
      app: integration-framework
  template:
    metadata:
      labels:
        app: integration-framework
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: integration-framework
          image: integration-framework:1.0.0-SNAPSHOT
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: http,kafka,cron
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: framework-secrets
                  key: redis-host
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: framework-config
                  key: kafka-brokers
          resources:
            requests: { memory: "512Mi", cpu: "250m" }
            limits:   { memory: "1Gi",   cpu: "1000m" }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 10
